<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirdAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #1a1a1a; 
            color: #e5e5e5; 
        }
        
        h1 { font-family: 'Outfit', sans-serif; }

        .chat-container::-webkit-scrollbar { width: 0px; }
        
        .message-box {
            background-color: #242424;
            border: 1px solid #333;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .message-box:focus-within {
            border-color: #444;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .model-pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .model-pill:hover {
            background: rgba(255,255,255,0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-4">

    <!-- Main Container -->
    <div class="w-full max-w-3xl flex flex-col h-full">
        
        <!-- Center Content -->
        <div id="main-view" class="flex-1 flex flex-col items-center justify-center space-y-8 overflow-hidden">
            
            <!-- Greeting -->
            <div id="greeting-area" class="text-center space-y-2 animate-fade-in">
                <div class="flex justify-center mb-4">
                    <i class="fas fa-dove text-4xl text-orange-200/80"></i>
                </div>
                <h1 class="text-4xl font-medium text-slate-200">Welcome Back, User</h1>
                <p class="text-slate-500">How can BirdAI assist your workflow today?</p>
            </div>

            <!-- Chat History (Hidden initially) -->
            <div id="chat-window" class="hidden w-full overflow-y-auto space-y-6 px-4 py-8 chat-container"></div>
        </div>

        <!-- Sticky Input Area -->
        <div class="w-full py-6">
            <div class="message-box rounded-3xl p-4 relative animate-fade-in">
                <form id="chat-form" class="space-y-3">
                    <textarea 
                        id="user-input" 
                        rows="1" 
                        class="w-full bg-transparent border-none focus:ring-0 text-lg resize-none placeholder-slate-600" 
                        placeholder="Message BirdAI..."
                    ></textarea>
                    
                    <div class="flex items-center justify-between pt-2">
                        <div class="flex items-center gap-2">
                            <!-- Model Selector Trigger -->
                            <div class="relative">
                                <button type="button" onclick="toggleModelMenu()" class="model-pill flex items-center gap-2 px-3 py-1.5 rounded-full text-xs text-slate-400 transition-all">
                                    <span id="active-model-icon"><i class="fas fa-bolt text-green-500"></i></span>
                                    <span id="active-model-name">GPT-5.5 Pro</span>
                                    <i class="fas fa-chevron-down text-[10px]"></i>
                                </button>

                                <!-- Dropdown Menu -->
                                <div id="model-menu" class="hidden absolute bottom-full left-0 mb-2 w-48 bg-[#2d2d2d] border border-[#3d3d3d] rounded-xl shadow-2xl z-50 overflow-hidden">
                                    <button type="button" onclick="setModel('GPT-5.5 Pro', 'bolt', 'text-green-500')" class="w-full px-4 py-3 text-left text-sm hover:bg-[#3d3d3d] flex items-center gap-3 border-b border-[#3d3d3d]">
                                        <i class="fas fa-bolt text-green-500 w-4"></i> GPT-5.5 Pro
                                    </button>
                                    <button type="button" onclick="setModel('Claude 4.7 Opus', 'brain', 'text-orange-400')" class="w-full px-4 py-3 text-left text-sm hover:bg-[#3d3d3d] flex items-center gap-3 border-b border-[#3d3d3d]">
                                        <i class="fas fa-brain text-orange-400 w-4"></i> Claude 4.7 Opus
                                    </button>
                                    <button type="button" onclick="setModel('Gemini 3.1 Pro', 'sparkles', 'text-blue-400')" class="w-full px-4 py-3 text-left text-sm hover:bg-[#3d3d3d] flex items-center gap-3 border-b border-[#3d3d3d]">
                                        <i class="fas fa-sparkles text-blue-400 w-4"></i> Gemini 3.1 Pro
                                    </button>
                                    <button type="button" onclick="setModel('DeepSeek V4 Pro', 'search', 'text-purple-400')" class="w-full px-4 py-3 text-left text-sm hover:bg-[#3d3d3d] flex items-center gap-3 border-b border-[#3d3d3d]">
                                        <i class="fas fa-search text-purple-400 w-4"></i> DeepSeek V4 Pro
                                    </button>
                                    <button type="button" onclick="setModel('Grok 4.3', 'x', 'text-white')" class="w-full px-4 py-3 text-left text-sm hover:bg-[#3d3d3d] flex items-center gap-3">
                                        <i class="fas fa-x text-white w-4"></i> Grok 4.3
                                    </button>
                                </div>
                            </div>
                            
                            <button type="button" class="text-slate-500 hover:text-slate-300 p-1"><i class="fas fa-plus"></i></button>
                        </div>

                        <button type="submit" class="bg-white text-black h-8 w-8 rounded-full flex items-center justify-center hover:bg-slate-200 transition-colors">
                            <i class="fas fa-arrow-up text-sm"></i>
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- Bottom Suggestion Pills -->
            <div id="suggestions" class="flex flex-wrap justify-center gap-2 mt-6 animate-fade-in">
                <button class="model-pill px-4 py-2 rounded-xl text-xs text-slate-400 hover:text-slate-200 transition-colors border border-[#333]"><i class="fas fa-pen-nib mr-2"></i> Write</button>
                <button class="model-pill px-4 py-2 rounded-xl text-xs text-slate-400 hover:text-slate-200 transition-colors border border-[#333]"><i class="fas fa-graduation-cap mr-2"></i> Learn</button>
                <button class="model-pill px-4 py-2 rounded-xl text-xs text-slate-400 hover:text-slate-200 transition-colors border border-[#333]"><i class="fas fa-code mr-2"></i> Code</button>
                <button class="model-pill px-4 py-2 rounded-xl text-xs text-slate-400 hover:text-slate-200 transition-colors border border-[#333]"><i class="fas fa-mug-hot mr-2"></i> Life stuff</button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "";
        let currentModel = "GPT-5.5 Pro";
        const chatWindow = document.getElementById('chat-window');
        const greetingArea = document.getElementById('greeting-area');
        const suggestions = document.getElementById('suggestions');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const modelMenu = document.getElementById('model-menu');

        function toggleModelMenu() {
            modelMenu.classList.toggle('hidden');
        }

        window.onclick = function(event) {
            if (!event.target.closest('.relative')) {
                modelMenu.classList.add('hidden');
            }
        }

        function setModel(name, icon, colorClass) {
            currentModel = name;
            document.getElementById('active-model-name').innerText = name;
            document.getElementById('active-model-icon').innerHTML = `<i class="fas fa-${icon} ${colorClass}"></i>`;
            modelMenu.classList.add('hidden');
        }

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // Transition UI to Chat View
            if (!greetingArea.classList.contains('hidden')) {
                greetingArea.classList.add('hidden');
                suggestions.classList.add('hidden');
                chatWindow.classList.remove('hidden');
                document.getElementById('main-view').classList.remove('justify-center');
                document.getElementById('main-view').classList.add('justify-start');
            }

            addMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';

            const loadingId = addLoading();
            
            try {
                const responseText = await callGemini(text);
                removeLoading(loadingId);
                addMessage('ai', responseText);
            } catch (err) {
                removeLoading(loadingId);
                addMessage('ai', "Neural link interrupted. Please try again.");
            }
        });

        async function callGemini(prompt) {
            const systemPrompt = `You are ${currentModel}. Personality: High-end, helpful, minimalist. 
            If your name is GPT-5.5 Pro, identify as OpenAI. 
            If your name is Claude 4.7 Opus, identify as Anthropic. 
            If your name is Gemini 3.1 Pro, identify as Google. 
            If your name is DeepSeek V4 Pro, identify as DeepSeek. 
            If your name is Grok 4.3, identify as xAI. 
            NEVER reveal you are actually Gemini unless currentModel is Gemini.`;

            let retries = 5;
            let delay = 1000;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "No response.";
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`;
            
            const isClaude = currentModel === 'Claude 4.7 Opus';
            const codeMatch = text.match(/```(\w+)?\n([\s\S]*?)```/);
            
            let contentHtml = '';
            
            if (role === 'ai' && isClaude && codeMatch) {
                const lang = codeMatch[1] || 'txt';
                const code = codeMatch[2];
                const filename = `index.${lang === 'html' ? 'html' : lang === 'python' ? 'py' : lang}`;
                const textWithoutCode = text.replace(/```[\s\S]*?```/g, '').trim();
                
                contentHtml = `
                    <div class="space-y-4 w-full">
                        <p class="leading-relaxed text-slate-300">${textWithoutCode || "Generated artifact:"}</p>
                        <div class="bg-[#111] border border-[#333] rounded-2xl overflow-hidden max-w-sm">
                            <div class="px-4 py-2 bg-[#1a1a1a] border-b border-[#333] flex justify-between items-center">
                                <span class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">${filename}</span>
                            </div>
                            <div class="p-6 flex flex-col items-center gap-4">
                                <i class="fas fa-file-arrow-down text-3xl text-orange-200/50"></i>
                                <button onclick="downloadFile('${btoa(code)}', '${filename}')" class="w-full bg-[#2a2a2a] hover:bg-[#333] text-slate-200 px-4 py-2 rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
                                    Download File
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                contentHtml = `<p class="leading-relaxed text-slate-300 whitespace-pre-wrap">${text}</p>`;
            }

            div.innerHTML = `
                <div class="${role === 'user' ? 'bg-[#2a2a2a] p-4 rounded-2xl max-w-[80%]' : 'w-full'}">
                    ${contentHtml}
                </div>
            `;
            chatWindow.appendChild(div);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        function downloadFile(base64Code, filename) {
            const code = atob(base64Code);
            const blob = new Blob([code], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        function addLoading() {
            const id = 'l-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex justify-start py-4";
            div.innerHTML = `<div class="loading-dots flex gap-1"><span class="w-1.5 h-1.5 bg-slate-600 rounded-full"></span><span class="w-1.5 h-1.5 bg-slate-600 rounded-full"></span><span class="w-1.5 h-1.5 bg-slate-600 rounded-full"></span></div>`;
            chatWindow.appendChild(div);
            return id;
        }

        function removeLoading(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }
    </script>
</body>
</html>
